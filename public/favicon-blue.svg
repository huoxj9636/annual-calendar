<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 医疗蓝圆角方形背景 -->
  <rect x="0" y="0" width="128" height="128" rx="20" ry="20" fill="#4A90D9"/>
  <!-- 简洁日历轮廓 -->
  <g stroke="white" stroke-width="4" stroke-linecap="round">
    <!-- 日历主体框架 -->
    <rect x="24" y="40" width="80" height="64" rx="6" ry="6" fill="none"/>
    <!-- 挂环 -->
    <circle cx="44" cy="40" r="8" fill="white"/>
    <circle cx="84" cy="40" r="8" fill="white"/>
    <!-- 挂环连接线 -->
    <line x1="44" y1="32" x2="44" y2="40"/>
    <line x1="84" y1="32" x2="84" y2="40"/>
  </g>
  <!-- 单个大数字显示 -->
  <text x="64" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">30</text>
</svg>